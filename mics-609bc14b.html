<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<!-- 検索エンジン除外（URLを知る人だけアクセス） -->
<meta name="robots" content="noindex, nofollow">
<!-- アプリ化（ホーム画面に追加でアドレスバーを完全に隠す） -->
<meta name="theme-color" content="#121417">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="microtone">
<link rel="manifest" href="manifest.json">
<title>microtone - MICS009 beta v0.1</title>
<style>
  :root{
    --bg:#121417;        /* graphite body */
    --panel:#1b1f24;
    --panel2:#23282f;
    --edge:#0a0c0e;
    --line:#32383f;
    --ink:#e8e4d8;        /* off-white silkscreen */
    --dim:#7b8088;
    --amber:#ff8a3d;      /* lit-pad amber */
    --amber-dim:#7a4a26;
    --teal:#3dd6c4;       /* active step / accent */
    --red:#ff4d4d;
    --pad:#2b3038;
    --pad-face:#343b44;
  }
  /* ===== Skin themes: 変数差し替えだけで着せ替え（AK / SP / RL）。背景はどれも黒 ===== */
  /* Akai MPC3000風：黒地 + 暖色グレー本体 + 緑の蛍光LCD + Akaiレッド + クリーム文字 */
  body.t-ak{--bg:#d6d0c0;--panel:#d2ccba;--panel2:#bdb8a8;--edge:#8f8a7c;--line:#a9a496;
    --ink:#2b2720;--dim:#6e695c;--amber:#cf3a2c;--amber-dim:#e2c2ae;--teal:#2a9d46;--pad:#8f8c82;--pad-face:#a6a399;}
  /* AK=MPC3000は明色（クリーム本体・グレーボタン）。暗いインセットだけ明色化し、波形はLCDとして暗いまま残す */
  body.t-ak .unit{background:#d2ccba;}
  body.t-ak #splash{background:#d6d0c0;}
  body.t-ak .modebar,body.t-ak .hint kbd{background:#c2bdac;}
  body.t-ak .ch-ms button{background:#c2bdac;color:#4a463b;}
  body.t-ak .modebtn .led{background:#9a958a;box-shadow:0 0 0 1px #8f8a7c inset;}
  /* E-mu SP-1200風：黒地 + 暖色ヴィンテージ + 青LCD */
  body.t-sp{--bg:#14151a;--panel:#5f6368;--panel2:#4d5156;--edge:#26282c;--line:#42464c;
    --ink:#f0f2f4;--dim:#aab0b6;--amber:#d6452f;--amber-dim:#5e1c14;--teal:#3f86d6;--pad:#3a3e43;--pad-face:#474c52;}
  /* SP-1200の質感：グレー本体＋青いセクションライン＋緑LCD寄りの画面＋赤アクセント */
  body.t-sp .label{color:#3f86d6;}
  body.t-sp .wave-wrap{background:#0a130c;}
  /* Roland TR-808風：黒地 + チャコール本体 + オレンジ/黄アクセント */
  body.t-rl{--bg:#0e0f11;--panel:#2c2f34;--panel2:#373c43;--edge:#121316;--line:#474d56;
    --ink:#eceff2;--dim:#8a9099;--amber:#ff7a2d;--amber-dim:#7a3a12;--teal:#ffcf3a;--pad:#33373d;--pad-face:#3e444c;}
  /* TR-808：枠をオレンジのグラデに（拍内で暗→明・OFF時のみ）。空セル=共通の灰グラデ、充填=共通のアンバー */
  body.t-rl .step:nth-child(4n+2):not(.on){border-color:#6e3310;}  /* 拍内1: 暗オレンジ */
  body.t-rl .step:nth-child(4n+3):not(.on){border-color:#a85a18;}  /* 拍内2 */
  body.t-rl .step:nth-child(4n):not(.on){border-color:#d98426;}    /* 拍内3 */
  body.t-rl .step:nth-child(4n+1):not(.on){border-color:#ffb24d;}  /* 拍内4: 明オレンジ */
  /* skin切替：右上角の最上位に小さく配置（行を増やさない） */
  .top{position:relative;}
  .transport{padding-right:84px;}            /* 右上角をskin用に空ける */
  #skinbar{position:absolute;top:0;right:0;z-index:5;display:flex;align-items:center;gap:5px;}
  #skinbar::before{content:"SKIN";font-size:8px;letter-spacing:.18em;color:var(--dim);}
  #skinbar .seg button{padding:4px 7px;font-size:9px;}
  *{box-sizing:border-box;margin:0;padding:0;}
  html,body{height:100%;overflow-x:hidden;}
  /* スマホ：ダブルタップ拡大/文字自動拡大/長押しメニューを抑止 */
  html{-webkit-text-size-adjust:100%;text-size-adjust:100%;scrollbar-gutter:stable;}
  button,select,label,.seg button,.modebtn,.msbtn,.step,.loadbtn,.toggle,.t{touch-action:manipulation;}
  body{-webkit-touch-callout:none;}
  body{
    background:#000;  /* アプリ外側（周りの余白）は常に黒 */
    color:var(--ink);
    font-family:"DIN Alternate","Bahnschrift","Arial Narrow",system-ui,sans-serif;
    letter-spacing:.04em;
    min-height:100%;
    padding:18px;
    -webkit-font-smoothing:antialiased;
  }
  .unit{
    width:100%;max-width:1080px;margin:0 auto;overflow:hidden;
    background:linear-gradient(180deg,var(--panel) 0%, #161a1f 100%);
    border:1px solid var(--edge);
    border-radius:14px;
    box-shadow:0 1px 0 #3a4047 inset, 0 24px 60px rgba(0,0,0,.55);
    padding:20px 22px 24px;
  }
  /* 全画面：背景を敷き、中身を上下中央に（はみ出す時は上から＝クリップしない） */
  html:fullscreen{background:#000;overflow-y:auto;scrollbar-gutter:auto;}
  html:fullscreen body{display:flex;flex-direction:column;min-height:100vh;}
  html:fullscreen .unit{margin-top:auto;margin-bottom:auto;}
  html:-webkit-full-screen{background:#000;overflow-y:auto;scrollbar-gutter:auto;}
  html:-webkit-full-screen body{display:flex;flex-direction:column;min-height:100vh;}
  html:-webkit-full-screen .unit{margin-top:auto;margin-bottom:auto;}
  /* header / silkscreen */
  .top{display:flex;align-items:flex-end;justify-content:space-between;
    border-bottom:1px solid var(--line);padding-bottom:14px;margin-bottom:18px;flex-wrap:wrap;gap:14px;}
  .brand{display:flex;align-items:baseline;gap:12px;}
  .brand .logo{font-size:30px;font-weight:700;letter-spacing:.02em;}
  .brand .logo b{color:var(--amber);}
  .brand .model{font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.28em;
    border:1px solid var(--line);border-radius:3px;padding:3px 7px;}
  .transport{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  button.t{
    background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:9px 14px;font:inherit;font-size:13px;letter-spacing:.12em;
    text-transform:uppercase;cursor:pointer;transition:.12s;min-width:60px;text-align:center;
  }
  button.t:hover{border-color:var(--dim);}
  button.t.play.on{background:var(--teal);color:#06201d;border-color:var(--teal);box-shadow:0 0 14px rgba(61,214,196,.4);}
  button.t#tap.on{background:var(--amber);color:#2a1405;border-color:var(--amber);}
  button.t.rec.on{background:var(--red);color:#2a0808;border-color:var(--red);}
  .readout{font-variant-numeric:tabular-nums;color:var(--teal);font-size:13px;
    border:1px solid var(--line);border-radius:5px;padding:8px 11px;background:#0d1013;min-width:64px;text-align:center;}
  .ctrl{display:flex;align-items:center;gap:7px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.18em;flex-shrink:1;min-width:0;}
  .ctrl input[type=range]{width:100%;min-width:50px;max-width:120px;flex:1;accent-color:var(--amber);}
  .ctrl .val{color:var(--ink);font-variant-numeric:tabular-nums;min-width:28px;text-align:right;}

  .body{display:grid;grid-template-columns:1fr;gap:24px;}

  .label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.26em;margin-bottom:10px;}

  /* pads */
  .pads{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;max-width:540px;}
  .pads .pad{aspect-ratio:1;}
  .pads.cols8{grid-template-columns:repeat(8,1fr);max-width:none;}
  .pads.cols8 .pad{aspect-ratio:1.8;padding:7px 8px;}
  .pads.cols8 .pad .nm{font-size:11px;}
  /* パッド行反転：1-8(ドラム)を下段、9-16(サンプル用)を上段 */
  .pads.cols8 .pad:nth-child(-n+8){order:2;}
  .pads.cols8 .pad:nth-child(n+9){order:1;}
  .pads:not(.cols8) .pad:nth-child(-n+4){order:4;}
  .pads:not(.cols8) .pad:nth-child(n+5):nth-child(-n+8){order:3;}
  .pads:not(.cols8) .pad:nth-child(n+9):nth-child(-n+12){order:2;}
  .pads:not(.cols8) .pad:nth-child(n+13){order:1;}

  /* S2400風スプリット（4×4時）：左にパッド、右に波形/操作、右下にStart/Stop */
  /* .active も必須にして、SEQ/MIX表示中にPADSが残らないようにする */
  #viewPads.split.active{
    display:grid;
    grid-template-columns:minmax(0,1.05fr) minmax(300px,.95fr);
    grid-template-rows:auto auto 1fr;
    grid-template-areas:
      "pads strip"
      "pads msbar"
      "pads transport";
    gap:14px 20px;
    align-items:start;
  }
  #viewPads.split .strip{grid-area:strip;margin-bottom:0;}
  #viewPads.split .msbar{grid-area:msbar;margin:0;}
  #viewPads.split .pads{grid-area:pads;max-width:none;align-self:start;}
  #viewPads.split .padTransport{grid-area:transport;align-self:end;display:flex;justify-content:flex-end;}
  .padTransport{display:none;}
  .padTransport .big-play{
    width:100%;padding:18px 20px;font-size:15px;font-weight:700;letter-spacing:.18em;
    border-radius:10px;border:1px solid var(--edge);cursor:pointer;text-transform:uppercase;
    background:linear-gradient(180deg,var(--panel2),var(--panel));color:var(--ink);
    box-shadow:0 4px 10px rgba(0,0,0,.4);transition:.08s;
  }
  .padTransport .big-play:active{transform:translateY(1px);}
  .padTransport .big-play.on{background:linear-gradient(180deg,#5a2230,#3a1620);color:var(--red);border-color:var(--red);}

  .pad{
    position:relative;border-radius:9px;cursor:pointer;
    background:linear-gradient(180deg,var(--pad-face),var(--pad));
    border:1px solid var(--edge);
    box-shadow:0 2px 0 #11141800 inset,0 4px 8px rgba(0,0,0,.4);
    display:flex;flex-direction:column;justify-content:space-between;
    padding:9px 10px;transition:transform .04s, box-shadow .12s, background .12s;
    user-select:none;touch-action:none;-webkit-tap-highlight-color:transparent;
  }
  .pad:active{transform:translateY(2px);}
  .pad>.pad-wave{position:absolute;inset:0;width:100%;height:100%;opacity:.3;pointer-events:none;border-radius:9px;}
  .pad .n{font-size:10px;color:var(--dim);font-variant-numeric:tabular-nums;position:relative;z-index:1;}
  .pad .nm{font-size:12px;color:var(--ink);text-transform:uppercase;letter-spacing:.06em;align-self:flex-start;position:relative;z-index:1;}
  .pad.sel{border-color:var(--teal);box-shadow:0 0 0 1px var(--teal) inset,0 4px 8px rgba(0,0,0,.4);}
  .pad.hit{background:linear-gradient(180deg,var(--amber),#c25e22);
    box-shadow:0 0 18px rgba(255,138,61,.55);}
  .pad.hit .nm,.pad.hit .n{color:#2a1405;}

  /* sequencer — 16-row grid */
  .seq-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:10px;flex-wrap:wrap;gap:10px;}
  .melo-banner{display:flex;align-items:center;gap:10px;font-size:12px;color:var(--teal);letter-spacing:.06em;}
  .melo-banner .t{padding:5px 10px;font-size:10px;}
  .dupbar{padding:5px 9px;font-size:10px;letter-spacing:.06em;}
  .pat-bar{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
  .patlabel{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.18em;}
  .patbtn{position:relative;}
  .patbtn.on{background:var(--amber);color:#2a1405;}
  .patbtn.playing{box-shadow:0 0 0 2px var(--teal);position:relative;z-index:2;}  /* 現在再生中を外枠で・最前面 */
  .patbtn.queued{box-shadow:0 0 0 2px var(--teal);z-index:2;animation:spblink .8s ease-in-out infinite;}  /* 予約中＝点滅 */
  .patbtn.has::after{content:"";position:absolute;top:3px;right:3px;width:4px;height:4px;border-radius:50%;background:var(--teal);opacity:.85;}  /* 中身ありドット */
  .patbtn.dim{opacity:.4;}  /* ループ外の小節は薄く */
  .pat-indicator{font-size:14px;font-weight:700;color:var(--teal);
    min-width:24px;text-align:center;padding:4px 8px;
    border:1px solid var(--teal);border-radius:5px;font-variant-numeric:tabular-nums;}
  /* MIX view - PADSと同じグリッド配置 */
  .mix-section{margin-bottom:24px;}
  .mixer{display:grid;grid-template-columns:repeat(8,1fr);gap:6px;}
  .mixer.mix4{grid-template-columns:repeat(4,1fr);}
  /* MIXも行反転（PADSと一致） */
  .mixer:not(.mix4) .ch:nth-child(-n+8){order:2;}
  .mixer:not(.mix4) .ch:nth-child(n+9){order:1;}
  .mixer.mix4 .ch:nth-child(-n+4){order:4;}
  .mixer.mix4 .ch:nth-child(n+5):nth-child(-n+8){order:3;}
  .mixer.mix4 .ch:nth-child(n+9):nth-child(-n+12){order:2;}
  .mixer.mix4 .ch:nth-child(n+13){order:1;}
  .ch{display:flex;flex-direction:column;align-items:center;gap:4px;
    background:var(--panel2);border:1px solid var(--edge);border-radius:6px;padding:8px 2px 10px;}
  .ch .ch-name{font-size:8px;color:var(--dim);text-transform:uppercase;letter-spacing:.04em;
    text-align:center;max-width:100%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
  .ch .ch-num{font-size:9px;color:var(--ink);font-variant-numeric:tabular-nums;}
  .ch-fader-wrap{position:relative;width:24px;height:90px;}
  .ch-vu{position:absolute;bottom:0;left:3px;right:3px;border-radius:3px;
    background:var(--amber);opacity:.6;transition:height .06s linear;pointer-events:none;}
  .ch-vu.peak{background:#ff4d4d;}
  .ch-fader-wrap input[type=range]{position:absolute;top:0;left:0;
    writing-mode:vertical-lr;direction:rtl;
    height:90px;width:24px;accent-color:var(--amber);opacity:.85;z-index:1;margin:0;}
  .ch .ch-val{font-size:9px;color:var(--dim);font-variant-numeric:tabular-nums;}
  .ch.muted{opacity:.4;}
  .ch.muted .ch-name{color:var(--red);}
  .ch.soloed .ch-num{color:var(--teal);}
  .ch-ms{display:flex;gap:3px;margin-top:2px;}
  .ch-ms button{border:none;border-radius:3px;padding:2px 5px;font:inherit;font-size:8px;
    letter-spacing:.06em;cursor:pointer;background:#1a1e23;color:var(--dim);transition:.1s;}
  .ch-ms button.m-on{background:var(--red);color:#fff;}
  .ch-ms button.s-on{background:var(--teal);color:#06201d;}
  /* master VU */
  .master-vu-wrap{position:relative;width:100%;height:16px;background:#0d1013;border:1px solid var(--line);border-radius:4px;overflow:hidden;margin-top:8px;}
  .master-vu-bar{height:100%;width:0;border-radius:3px;
    background:linear-gradient(90deg,var(--teal),var(--amber));transition:width .06s linear;}
  .master-vu-bar.peak{background:linear-gradient(90deg,var(--amber),#ff4d4d);}
  .master-section{border-top:1px solid var(--line);padding-top:18px;}
  .master-ctrls{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap;}
  .master-ctrls .knob{flex:1 1 120px;max-width:180px;}
  /* MASTER OUTPUT をモード切替ボタンの横に常設（横並び・コンパクト） */
  .modebar-row{display:flex;align-items:center;gap:20px;margin:16px 0 20px;flex-wrap:wrap;}
  .modebar-row .modebar{margin:0;}
  .master-bar{flex:1 1 380px;min-width:260px;display:flex;align-items:center;gap:14px;
    border-left:1px solid var(--line);padding-left:16px;}
  .master-bar .master-vu-wrap{flex:0 0 70px;width:70px;margin-top:0;}
  .master-bar .master-ctrls{flex:1;gap:14px;align-items:center;margin:0;}
  .master-bar .master-ctrls .knob{flex:1 1 70px;max-width:150px;}
  .track-name{font-size:13px;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;}
  .colnums{display:grid;grid-template-columns:60px repeat(16,1fr);gap:4px;margin-bottom:5px;min-width:500px;}
  .colnums .cn{font-size:9px;color:var(--dim);text-align:center;font-variant-numeric:tabular-nums;}
  .colnums .cn:nth-child(4n+2){color:var(--ink);}
  .grid{display:flex;flex-direction:column;gap:3px;min-width:500px;flex:1 1 auto;min-height:0;}
  .row{display:grid;grid-template-columns:60px repeat(16,1fr);gap:4px;align-items:stretch;flex:1 1 0;min-height:0;}
  .row .rn{
    font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.02em;
    white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;
    padding:2px 6px;border:1px solid transparent;border-radius:4px;align-self:center;
  }
  .row .rn:hover{border-color:var(--line);}
  .row.sel .rn{color:var(--teal);border-color:var(--teal);}
  .row .rn b{color:var(--ink);}
  .step{
    border-radius:4px;background:#1a1e23;border:1px solid var(--line);
    cursor:pointer;transition:.08s;position:relative;min-height:0;
  }
  /* 全モード共通：16ステップを4グループの灰色グラデで可視化（OFFガイド。ONはテーマ色） */
  /* 全モード共通：各拍(4ステップ)の中で暗→明のグラデを繰り返す＝拍内の位置が分かる（OFFガイド。ONはテーマ色） */
  .step:nth-child(4n+2):not(.on){background:#353a42;}  /* 拍内1 (1,5,9,13): 暗 */
  .step:nth-child(4n+3):not(.on){background:#5c636d;}  /* 拍内2 (2,6,10,14) */
  .step:nth-child(4n):not(.on){background:#838a95;}    /* 拍内3 (3,7,11,15) */
  .step:nth-child(4n+1):not(.on){background:#aab1bc;}  /* 拍内4 (4,8,12,16): 明 */
  .step:nth-child(4n+2){border-left:2px solid #4a525c;}  /* 拍の区切り線 */
  .step.on{background:var(--amber);border-color:#ffb27a;box-shadow:0 0 8px rgba(255,138,61,.35);}
  .step.acc.on{background:#fff;box-shadow:0 0 10px rgba(255,255,255,.5);}
  .grid.playcol .step.cursor{box-shadow:0 0 0 2px var(--teal) inset;}
  .seq-foot{display:flex;gap:14px;margin-top:14px;flex-wrap:wrap;align-items:center;}
  .seq-foot .ctrl input[type=range]{min-width:50px;max-width:120px;}
  .hint{font-size:10px;color:var(--dim);letter-spacing:.08em;margin-top:14px;line-height:1.7;}
  .hint kbd{background:#0d1013;border:1px solid var(--line);border-radius:3px;padding:1px 5px;color:var(--ink);font-family:inherit;}
  .file{font-size:11px;}
  .file label{color:var(--teal);cursor:pointer;text-transform:uppercase;letter-spacing:.14em;border:1px dashed var(--line);padding:6px 10px;border-radius:5px;display:inline-block;}
  .file input{display:none;}
  select.t{appearance:none;}
  select.t:focus{box-shadow:0 0 0 2px var(--amber);outline:none;}
  /* mode switch (実機風) */
  .modebar{display:flex;gap:0;margin:16px 0 20px;
    background:#0d1013;border:1px solid var(--edge);border-radius:8px;padding:5px;width:fit-content;
    box-shadow:0 2px 6px rgba(0,0,0,.4) inset;}
  .modebtn{
    background:transparent;color:var(--dim);border:1px solid transparent;
    border-radius:5px;padding:10px 26px;font:inherit;font-size:13px;letter-spacing:.22em;
    text-transform:uppercase;cursor:pointer;transition:.14s;display:flex;align-items:center;gap:9px;
  }
  .modebtn .led{width:7px;height:7px;border-radius:50%;background:#2c333b;box-shadow:0 0 0 1px #0a0c0e inset;transition:.14s;}
  .modebtn:hover{color:var(--ink);}
  .modebtn.on{background:var(--panel2);color:var(--ink);border-color:var(--line);}
  .modebtn.on .led{background:var(--amber);box-shadow:0 0 8px var(--amber);}
  .view{display:none;}
  .view.active{display:block;}
  #viewSeq.active{overflow-x:auto;overflow-y:hidden;display:flex;flex-direction:column;}
  #viewMix.active{overflow-x:auto;overflow-y:auto;scrollbar-gutter:stable;}
  /* mute / solo hold bar */
  .msbar{display:flex;align-items:center;gap:8px;margin-bottom:14px;flex-wrap:wrap;}
  .msbtn{
    display:flex;align-items:center;gap:6px;flex:0 0 auto;
    background:var(--panel2);color:var(--ink);border:1px solid var(--line);
    border-radius:6px;padding:8px 14px;font:inherit;font-size:11px;letter-spacing:.14em;
    text-transform:uppercase;cursor:pointer;transition:.1s;user-select:none;touch-action:none;
  }
  .msbtn .d{width:7px;height:7px;border-radius:50%;background:#2c333b;box-shadow:0 0 0 1px #0a0c0e inset;transition:.1s;}
  .msbtn.mute.armed{background:var(--red);color:#2a0808;border-color:var(--red);box-shadow:0 0 16px rgba(255,77,77,.5);}
  .msbtn.mute.armed .d{background:#fff;box-shadow:0 0 8px #fff;}
  .msbtn.solo.armed{background:var(--teal);color:#06201d;border-color:var(--teal);box-shadow:0 0 16px rgba(61,214,196,.5);}
  .msbtn.solo.armed .d{background:#06201d;box-shadow:0 0 6px #06201d;}
  .msbtn.copy.armed{background:#ffd24d;color:#3a2c00;border-color:#ffd24d;box-shadow:0 0 16px rgba(255,210,77,.5);}
  .msbtn.copy.armed .d{background:#3a2c00;}
  .msbtn.chop.armed{background:#b07cff;color:#1d0a3a;border-color:#b07cff;box-shadow:0 0 16px rgba(176,124,255,.5);}
  .msbtn.chop.armed .d{background:#1d0a3a;}
  .pad.copysrc{box-shadow:0 0 0 2px #ffd24d inset,0 4px 8px rgba(0,0,0,.4);}
  .mshint{font-size:10px;color:var(--dim);letter-spacing:.1em;}
  /* pad mute/solo state */
  .pad.muted{opacity:.4;}
  .pad.muted::after{content:"M";position:absolute;top:7px;right:9px;font-size:11px;color:var(--red);font-weight:700;}
  .pad.soloed{box-shadow:0 0 0 2px var(--teal) inset,0 4px 8px rgba(0,0,0,.4);}
  .pad.soloed::after{content:"S";position:absolute;top:7px;right:9px;font-size:11px;color:var(--teal);font-weight:700;}
  /* Koala-style waveform strip */
  .strip{background:var(--panel);border:1px solid var(--edge);border-radius:10px;padding:12px 14px;margin-bottom:16px;}
  .strip-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;}

  .strip-actions{display:flex;align-items:center;gap:10px;}

  .loadbtn:hover{border-color:var(--teal);}
  .strip-ctrls{display:flex;align-items:flex-end;gap:16px;flex-wrap:wrap;margin-top:12px;}
  .knob.mini{flex:1 1 90px;min-width:80px;max-width:140px;gap:4px;}
  .knob.mini label{font-size:9px;}
  /* sample editor */
  .ed-head{display:flex;align-items:baseline;justify-content:space-between;margin-bottom:12px;}
  .ed-head .who{font-size:15px;color:var(--amber);text-transform:uppercase;letter-spacing:.1em;}
  .wave-wrap{position:relative;background:#0c0f12;border:1px solid var(--line);border-radius:8px;
    height:96px;overflow:hidden;cursor:crosshair;touch-action:none;}
  #wave{display:block;width:100%;height:100%;}
  .handle{position:absolute;top:0;bottom:0;width:2px;pointer-events:none;}
  .handle.start{background:var(--teal);}
  .handle.end{background:var(--red);}
  .handle.loop{background:#ffd24d;}
  .handle .cap{position:absolute;top:2px;font-size:8px;letter-spacing:.1em;padding:1px 3px;border-radius:2px;color:#06201d;white-space:nowrap;}
  .handle.start .cap{left:3px;background:var(--teal);}
  .handle.end .cap{right:3px;background:var(--red);color:#2a0808;}
  .handle.loop .cap{left:3px;background:#ffd24d;color:#3a2c00;}
  .shade{position:absolute;top:0;bottom:0;background:rgba(0,0,0,.55);pointer-events:none;}
  .playhead{position:absolute;top:0;bottom:0;width:2px;background:#fff;opacity:0;pointer-events:none;box-shadow:0 0 6px rgba(255,255,255,.8);}
  /* sampling overlay */
  .rec-overlay{position:absolute;inset:0;background:rgba(12,15,18,.92);display:none;
    justify-content:center;align-items:center;z-index:5;border-radius:8px;}
  .rec-overlay.show{display:flex;}
  .rec-panel{display:flex;gap:10px;align-items:center;}
  .rec-dot{color:var(--red);font-size:18px;animation:blink .6s infinite;}
  @keyframes blink{0%,100%{opacity:1;}50%{opacity:.2;}}
  .knob{display:flex;flex-direction:column;gap:5px;}
  .knob label{font-size:10px;color:var(--dim);text-transform:uppercase;letter-spacing:.16em;display:flex;justify-content:space-between;gap:8px;}
  .knob label .v{color:var(--ink);font-variant-numeric:tabular-nums;}
  .knob input[type=range]{width:100%;accent-color:var(--amber);}
  .knob input[type=range]:focus{box-shadow:0 0 0 2px var(--amber);border-radius:3px;outline:none;}
  .ctrl input[type=range]:focus{box-shadow:0 0 0 2px var(--amber);border-radius:3px;outline:none;}
  .seg{display:flex;gap:0;background:#0d1013;border:1px solid var(--line);border-radius:6px;padding:3px;width:fit-content;}
  .seg button{background:transparent;color:var(--dim);border:none;border-radius:4px;
    padding:6px 14px;font:inherit;font-size:11px;letter-spacing:.12em;text-transform:uppercase;cursor:pointer;transition:.1s;}
  .seg button.on{background:var(--panel2);color:var(--ink);}
  .toggle{display:flex;align-items:center;gap:8px;font-size:11px;color:var(--dim);text-transform:uppercase;letter-spacing:.14em;cursor:pointer;}
  .toggle .sw{width:38px;height:20px;border-radius:10px;background:#23282f;border:1px solid var(--line);position:relative;transition:.1s;}
  .toggle .sw::after{content:"";position:absolute;top:2px;left:2px;width:14px;height:14px;border-radius:50%;background:var(--dim);transition:.12s;}

<body>

<script>
const STEPS = 16;
// --- pad definitions: 8 synth voices + 8 empty sample slots ---
const PADS = [
  {name:"KICK", type:"synth", voice:"kick"},
  {name:"SNARE",type:"synth", voice:"snare"},
  {name:"HAT",  type:"synth", voice:"hat"},
  {name:"OHAT", type:"synth", voice:"ohat"},
  {name:"CLAP", type:"synth", voice:"clap"},
  {name:"RIM",  type:"synth", voice:"rim"},
  {name:"TOM",  type:"synth", voice:"tom"},
  {name:"SINBASS", type:"synth", voice:"sinbass"},
  {name:"PAD 9", type:"empty"},
  {name:"PAD 10",type:"empty"},
  {name:"PAD 11",type:"empty"},
  {name:"PAD 12",type:"empty"},
  {name:"PAD 13",type:"empty"},
  {name:"PAD 14",type:"empty"},
  {name:"PAD 15",type:"empty"},
  {name:"PAD 16",type:"empty"},
];
const KEYMAP = ["1","2","3","4","5","6","7","8","q","w","e","r","t","y","u","i"];
// Shift+キーは記号になるため、レイアウト非依存の e.code でも判定（ミュート用）
const CODEMAP = ["Digit1","Digit2","Digit3","Digit4","Digit5","Digit6","Digit7","Digit8","KeyQ","KeyW","KeyE","KeyR","KeyT","KeyY","KeyU","KeyI"];

// ===== MPC-style sampler engine (raw Web Audio) =====
// 全パッドが1つのAudioContextを共有。発音はバッファを持つボイスをプールから確保。
// 各ヒット = 1 AudioBufferSourceNode（使い切りだが正しい使い方=リークしない）。
// チョークグループで前のボイスを止める。プリセット音は起動時にオフラインレンダリングして焼き込む。

const AC = new (window.AudioContext||window.webkitAudioContext)({latencyHint:"interactive"});
const masterGain = AC.createGain();
masterGain.gain.value = 0.9;

// ===== アナログ風マスターコンプ + サチュレーション =====
// Chain: voices → masterGain → comp → saturator → makeupGain → destination
const comp = AC.createDynamicsCompressor();
comp.threshold.value = -12;   // dB（COMPつまみで動かす）
comp.knee.value = 12;         // ソフトニー（アナログ的な緩い圧縮）
comp.ratio.value = 4;
comp.attack.value = 0.008;    // 8ms（パーカッション向け、速めだがアタック殺さない）
comp.release.value = 0.12;    // 120ms（SP的なポンピング感）

// サチュレーション（ソフトクリップ）
const saturator = AC.createWaveShaper();
function makeSatCurve(drive){
  const n=1024, curve=new Float32Array(n);
  for(let i=0;i<n;i++){
    const x=i*2/n-1;
    // tanh系ソフトクリップ。driveが高いほど歪む
    curve[i]=Math.tanh(x*drive)/Math.tanh(drive);
  }
  return curve;
}
saturator.curve = makeSatCurve(1.5);
saturator.oversample = "2x"; // エイリアシング低減

// メイクアップゲイン
const makeupGain = AC.createGain();
makeupGain.gain.value = 1.2;  // 圧縮分の音量補償

// ===== テープ質感（固定・常時ON）=====
// ワウフラッター：遅延線をLFOで揺らしてピッチを微妙に揺らす
const tapeDelay = AC.createDelay(0.05);
tapeDelay.delayTime.value = 0.003;  // ベース3ms

// Wow（遅い揺れ 〜0.7Hz ±0.4ms）
const wowLfo = AC.createOscillator();
wowLfo.type = "sine"; wowLfo.frequency.value = 0.7;
const wowDepth = AC.createGain();
wowDepth.gain.value = 0.0004;  // 0.4ms
wowLfo.connect(wowDepth);
wowDepth.connect(tapeDelay.delayTime);

// Flutter（速い揺れ 〜4.5Hz ±0.08ms）
const flutterLfo = AC.createOscillator();
flutterLfo.type = "sine"; flutterLfo.frequency.value = 4.5;

// テープヒス（高域ノイズ、ごく小さく常時混入）
const hissLen = AC.sampleRate * 2;
const hissBuf = AC.createBuffer(1, hissLen, AC.sampleRate);
const hissData = hissBuf.getChannelData(0);
for(let n = 0; n < hissLen; n++) hissData[n] = Math.random() * 2 - 1;
const hissNode = AC.createBufferSource();
hissNode.buffer = hissBuf; hissNode.loop = true;
const hissHp = AC.createBiquadFilter();
hissHp.type = "highpass"; hissHp.frequency.value = 4000;
const hissGain = AC.createGain();
// スマホは小型スピーカーが高域を強調＆音量も小さめでヒスが目立つため大幅に下げる
const isMobileHiss = (window.matchMedia && matchMedia("(pointer:coarse)").matches)
                     || /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent||"");
hissGain.gain.value = isMobileHiss ? 0.0002 : 0.0006;
// 耳障りな最上部を少し丸める（特にスマホで効く）
const hissLp = AC.createBiquadFilter();
hissLp.type = "lowpass"; hissLp.frequency.value = 8500;
hissNode.connect(hissHp); hissHp.connect(hissLp); hissLp.connect(hissGain);
hissGain.connect(AC.destination);
hissNode.start();

// ===== 低域倍音エンハンサー（固定・常時ON）=====
// 低域を分離 → 偶数倍音を足す → 小さく混ぜ戻し = ふっくらした低音
const bassLp = AC.createBiquadFilter();
bassLp.type = "lowpass"; bassLp.frequency.value = 150; bassLp.Q.value = 0.7;
// 偶数倍音を生む非対称waveshaper（チューブ的な温かみ）
const bassSat = AC.createWaveShaper();
const bsCurve = new Float32Array(1024);
for(let i = 0; i < 1024; i++){
  const x = i * 2 / 1024 - 1;
  bsCurve[i] = x + 0.35 * x * x;  // 非対称 = 2次倍音（偶数）が出る
}
bassSat.curve = bsCurve;
bassSat.oversample = "2x";
const bassGain = AC.createGain();
bassGain.gain.value = 0.12;  // 控えめに混ぜる
// masterGainからパラレルに分岐
masterGain.connect(bassLp);
bassLp.connect(bassSat);
bassSat.connect(bassGain);
bassGain.connect(tapeDelay);  // テープ経由で出力

// 接続（テープ質感込み）
// comp経路: masterGain → comp → saturator → makeupGain → tapeDelay → destination
// bypass経路: masterGain → bypassGain → tapeDelay → destination
// テープは常時ON（どちらの経路でもかかる）
masterGain.connect(comp);
comp.connect(saturator);
saturator.connect(makeupGain);
makeupGain.connect(tapeDelay);
tapeDelay.connect(AC.destination);

// バイパス経路（OFF時）もテープを通す
let compOn = true;
const bypassGain = AC.createGain();
bypassGain.gain.value = 0;
masterGain.connect(bypassGain);
bypassGain.connect(tapeDelay);  // bypass経路もテープを通す

function setCompBypass(on){
  compOn = on;
  if(on){
    comp.threshold.value = compThreshold;
    makeupGain.gain.value = compMakeup;
    bypassGain.gain.value = 0;
  } else {
    // コンプ経路をミュート、バイパス経路を開く
    comp.threshold.value = 0;  // 閾値0dBで実質かからない
    makeupGain.gain.value = 0;
    bypassGain.gain.value = 0.9;
  }
}
let compThreshold = -12;
let compDrive = 1.5;
let compMakeup = 1.2;

// --- per-pad state ---

  // patterns[パターン0-3(A-D)][小節0-3(1-4)][ステップ0-15]
  patterns:Array.from({length:4},()=>Array.from({length:4},()=>new Array(STEPS).fill(0))),
  vol:-4,            // dB
  scale:"off",       // 音階モード: off / chro / maj / min / pent
  buffer:null,       // AudioBuffer (12bit-processed; preset or loaded sample)
  rawBuffer:null,    // 加工前バッファ（再12bit化や設定変更時の元）
  tune:0,            // semitones
  start:0,           // 0..1 再生開始
  end:1,             // 0..1 再生終了
  loop:false,        // ループon/off
  loopStart:0,       // 0..1 ループ戻り先
  filter:"off",      // "off" | "lp" | "hp"

// SP風 12bit Lo-Fi 設定（全音源共通）
const LOFI = { bits:12, targetRate:26040 }; // SP-1200 ≒ 26kHz

let selected = 0;
let playing = false;
let stepIdx = 0;
let playStep = 0;
let recording = false;
let editPat = 0;       // 編集中パターン 0-3 (A-D)
let editBar = 0;       // 編集中の小節 0-3 (1-4)
let playPat = 0;       // 再生中パターン（スケジューラ用）
let playBar = 0;       // 再生中の小節（スケジューラ用）
let queuedPat = null;  // 予約中パターン（次の小節アタマで切替）
let displayPat = 0;    // 表示中の再生パターン（drawLoop用）
let displayBar = 0;    // 表示中の再生小節（drawLoop用）
const PAT_NAMES = ["A","B","C","D"];

// 編集中（パターン×小節）へのアクセサ
function getPattern(trackIdx){ return tracks[trackIdx].patterns[editPat][editBar]; }
// 再生中（パターン×小節）へのアクセサ
function getPlayPattern(trackIdx){ return tracks[trackIdx].patterns[playPat][playBar]; }
// 小節に音があるか／パターンの長さ（書いた分・最低1小節）
function barHasContent(p,b){ for(let i=0;i<PADS.length;i++){ const a=tracks[i].patterns[p][b]; for(let s=0;s<STEPS;s++) if(a[s]>0) return true; } return false; }
function patHasContent(p){ for(let b=0;b<4;b++) if(barHasContent(p,b)) return true; return false; }
function patLength(p){ let last=0; for(let b=0;b<4;b++) if(barHasContent(p,b)) last=b; return last+1; }

// ===== 音階モード（モノ・ベース打ち込み） =====
const SCALES={ maj:[0,2,4,5,7,9,11], min:[0,2,3,5,7,8,10], pent:[0,3,5,7,10] };  // chroは半音=idx
const NOTE_NAMES=["C","C#","D","D#","E","F","F#","G","G#","A","A#","B"];
let melodicMode=false;   // 選択中パッドが音階モードか（SEQ盤面の表示を切替）
function isMelodic(i){ return !!(tracks[i] && tracks[i].scale && tracks[i].scale!=="off"); }
function scaleSemi(sc, idx){ if(sc==="chro"||!SCALES[sc]) return idx; const a=SCALES[sc]; return Math.floor(idx/a.length)*12 + a[idx%a.length]; }
function noteLabel(sc, idx){ const s=scaleSemi(sc,idx); return NOTE_NAMES[((s%12)+12)%12]+Math.floor(s/12); }
function setDrumRowLabels(){ for(let i=0;i<PADS.length;i++){ const rn=grid.children[i]&&grid.children[i].querySelector(".rn"); if(rn) rn.innerHTML=`<b>${String(i+1).padStart(2,"0")}</b> ${tracks[i].name||PADS[i].name}`; } }
function paintMelodic(){
  const pat=getPattern(selected);
  for(let r=0;r<PADS.length;r++){
    const pitchIdx=(PADS.length-1)-r;   // 下の行ほど低い音

    });

function refreshSeqMode(){

  const banner=document.getElementById("meloBanner");
  if(banner) banner.style.display=melodicMode?"":"none";

}

function dbToGain(db){ return Math.pow(10, db/20); }

// ===== SP風 12bit Lo-Fi 処理 =====
// ビット量子化 + サンプルレート低下（間引き＆ホールドで高域を落とす）
function makeLofi(buffer){
  const ch = buffer.numberOfChannels;
  const sr = buffer.sampleRate;
  const out = AC.createBuffer(ch, buffer.length, sr);
  const levels = Math.pow(2, LOFI.bits);          // 12bit = 4096段
  const half = levels/2;
  const hold = Math.max(1, Math.round(sr / LOFI.targetRate)); // 何サンプルに1回更新するか
  for(let c=0;c<ch;c++){
    const src = buffer.getChannelData(c);
    const dst = out.getChannelData(c);
    let held = 0;
    for(let n=0;n<src.length;n++){
      if(n % hold === 0){
        // サンプル&ホールド（レート低下）＋ 12bit量子化
        let s = src[n];
        s = Math.round(s*half)/half;              // 量子化
        held = s;
      }
      dst[n] = held;
    }
  }
  return out;
}

// 同じチョークグループの鳴っている音を即停止
function chokeGroup(group, exceptPad, when){
  if(!group) return;
  for(let j=0;j<tracks.length;j++){
    if(j===exceptPad) continue;
    if(tracks[j].choke===group) stopVoices(tracks[j], when);
  }
}
function stopVoices(t, when){
  t.activeVoices.forEach(v=>{
    try{
      v.env.gain.cancelScheduledValues(when);
      v.env.gain.setTargetAtTime(0, when, 0.005); // 5ms フェードで切る
      v.src.stop(when+0.03);
    }catch(e){}
  });
  t.activeVoices.length=0;
}

// ソロが1つでもonなら、ソロ対象以外は鳴らさない
function anySolo(){ return tracks.some(t=>t.solo); }
function audible(i){
  const t=tracks[i];
  if(t.mute) return false;
  if(anySolo() && !t.solo) return false;
  return true;
}

// 1ヒット発音
function playVoice(i, when, accent, fromSeq, noteSemi){
  const t = tracks[i];
  if(!t.buffer) return;
  // シーケンサー由来はmute/soloを尊重。手叩き（fromSeq=false）は常に鳴らす＝演奏感
  if(fromSeq && !audible(i)) return;

  stopVoices(t, when);
  chokeGroup(t.choke, i, when);

  const dur = t.buffer.duration;
  const sN = Math.min(0.999, Math.max(0, t.start));
  const eN = Math.min(1, Math.max(sN+0.001, t.end));
  const startSec = sN*dur, endSec = eN*dur;

  const src = AC.createBufferSource();
  src.buffer = t.buffer;
  src.playbackRate.value = Math.pow(2, (t.tune + (noteSemi||0))/12);

  // フィルター（off時は挟まない）
  let head = src;
  let filt = null;
  if(t.filter!=="off"){
    filt = AC.createBiquadFilter();
    filt.type = t.filter==="lp" ? "lowpass" : "highpass";
    filt.frequency.value = t.cutoff;
    filt.Q.value = t.reso;
    src.connect(filt); head = filt;
  }
  const env = AC.createGain();
  const peak = dbToGain(t.vol + (accent?5:0));
  head.connect(env); env.connect(masterGain);

  // プツ音回避：頭3ms フェードイン、ワンショット終端3ms フェードアウト
  const FADE = 0.003;

  if(t.loop){
    const lsN = Math.min(eN-0.001, Math.max(0, t.loopStart));
    src.loop = true;
    src.loopStart = lsN*dur;
    src.loopEnd = endSec;
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(peak, when+FADE);
    try{ src.start(when, startSec); }catch(e){ try{src.start(when);}catch(_){} }
    // ループは終端で切らない（ループ点はゼロ交差でなくてもプツは出にくい）。停止時にstopVoicesがフェードアウト
  } else {
    const len = Math.max(0.005, (endSec-startSec)/src.playbackRate.value);
    env.gain.setValueAtTime(0, when);
    env.gain.linearRampToValueAtTime(peak, when+Math.min(FADE,len*0.4));
    // 終端フェードアウト
    const fadeOutStart = when + Math.max(0, len-FADE);
    env.gain.setValueAtTime(peak, fadeOutStart);
    env.gain.linearRampToValueAtTime(0, when+len);
    try{ src.start(when, startSec, len); }catch(e){ try{src.start(when);}catch(_){} }
  }

  const voice = {src, env, filt};
  // 波形プレイヘッド：選択中パッドの発音を記録
  if(i===selected){
    lastPlayhead = {
      pad:i, when, startN:sN, endN:eN,
      rate:src.playbackRate.value,
      loop:t.loop, loopStartN: t.loop?Math.min(eN-0.001,Math.max(0,t.loopStart)):0,
      dur:t.buffer.duration,
    };
    ensureCursorLoop();
  }
  t.activeVoices.push(voice);
  src.onended = ()=>{
    const k=t.activeVoices.indexOf(voice);
    if(k>=0) t.activeVoices.splice(k,1);
    try{src.disconnect();env.disconnect();if(filt)filt.disconnect();}catch(e){}
  };
}

// ---------- trigger (UI/seq 共通入口) ----------
function trigger(i, time, accent=false){
  if(AC.state!=="running") AC.resume();
  const when = (time!=null) ? time : AC.currentTime;
  playVoice(i, when, accent, false);
  flashPad(i);
  if(typeof vuHit==="function") vuHit(i, accent);
  if(recording && playing){
    getPlayPattern(i)[playStep] = accent?2:1;
    paintSteps();
  }
}

// ===== プリセット音をオフラインで生成して各パッドに焼き込む =====
async function renderPreset(voice){
  const dur = 1.2, sr = AC.sampleRate;
  const off = new OfflineAudioContext(1, Math.ceil(sr*dur), sr);
  const out = off.destination;
  const now = 0;
  const noiseBuf = (len)=>{
    const b=off.createBuffer(1,Math.ceil(sr*len),sr);
    const d=b.getChannelData(0);
    for(let n=0;n<d.length;n++) d[n]=Math.random()*2-1;
    return b;
  };
  const env=(node,a,dcy,peak=1)=>{
    const g=off.createGain();node.connect(g);
    g.gain.setValueAtTime(0,now);
    g.gain.linearRampToValueAtTime(peak,now+a);
    g.gain.exponentialRampToValueAtTime(0.0001,now+a+dcy);
    return g;
  };
  if(voice==="kick"){
    const o=off.createOscillator();o.type="sine";
    o.frequency.setValueAtTime(150,now);o.frequency.exponentialRampToValueAtTime(45,now+.12);
    env(o,.001,.4,1).connect(out);o.start(now);o.stop(now+.5);
  } else if(voice==="snare"){
    const o=off.createOscillator();o.type="triangle";o.frequency.setValueAtTime(180,now);
    env(o,.001,.12,.6).connect(out);o.start(now);o.stop(now+.2);
    const n=off.createBufferSource();n.buffer=noiseBuf(.3);
    const hp=off.createBiquadFilter();hp.type="highpass";hp.frequency.value=1200;
    n.connect(hp);env(hp,.001,.18,.8).connect(out);n.start(now);
  } else if(voice==="hat"||voice==="ohat"){
    const open=voice==="ohat";
    const n=off.createBufferSource();n.buffer=noiseBuf(open?.4:.1);
    const hp=off.createBiquadFilter();hp.type="highpass";hp.frequency.value=7000;
    n.connect(hp);env(hp,.001,open?.3:.04,.5).connect(out);n.start(now);
  } else if(voice==="clap"){
    const n=off.createBufferSource();n.buffer=noiseBuf(.3);
    const bp=off.createBiquadFilter();bp.type="bandpass";bp.frequency.value=1200;bp.Q.value=2;
    n.connect(bp);env(bp,.001,.2,.7).connect(out);n.start(now);
  } else if(voice==="rim"){
    const o=off.createOscillator();o.type="square";o.frequency.value=420;
    const bp=off.createBiquadFilter();bp.type="bandpass";bp.frequency.value=1700;bp.Q.value=6;
    o.connect(bp);env(bp,.001,.05,.5).connect(out);o.start(now);o.stop(now+.1);
  } else if(voice==="tom"){
    const o=off.createOscillator();o.type="sine";
    o.frequency.setValueAtTime(220,now);o.frequency.exponentialRampToValueAtTime(90,now+.2);
    env(o,.001,.3,.9).connect(out);o.start(now);o.stop(now+.4);
  } else if(voice==="perc"){
    // サイン波ベースの音階パーカッション（コンガ/トム的・チューンしやすい）
    const o=off.createOscillator();o.type="sine";
    o.frequency.setValueAtTime(520,now);o.frequency.exponentialRampToValueAtTime(190,now+.12);
    const o2=off.createOscillator();o2.type="sine";o2.frequency.value=780;  // 倍音を薄く
    const g2=off.createGain();g2.gain.value=0.18;o2.connect(g2);g2.connect(out);
    env(o,.001,.24,.6).connect(out);
    o.start(now);o2.start(now);o.stop(now+.32);o2.stop(now+.06);
  } else if(voice==="sinbass"){
    // サイン波ベース（C2≈65Hz基準）。音階モードでベースラインを打てる
    const o=off.createOscillator();o.type="sine";
    o.frequency.setValueAtTime(98,now);o.frequency.exponentialRampToValueAtTime(65.4,now+.05);  // 頭だけ少し上から落として太さを出す
    const sub=off.createOscillator();sub.type="sine";sub.frequency.value=65.4;  // サブを薄く重ねる
    const sg=off.createGain();sg.gain.value=0.3;sub.connect(sg);sg.connect(out);
    env(o,.004,.5,.98).connect(out);
    o.start(now);sub.start(now);o.stop(now+.6);sub.stop(now+.6);
  }
  const rendered = await off.startRendering();
  return rendered;
}

// バッファの実際の鳴ってる終端（無音手前）を 0..1 で返す
function contentEnd(buf){
  const d=buf.getChannelData(0), n=d.length, thr=0.004;
  let last=0; for(let k=n-1;k>=0;k--){ if(Math.abs(d[k])>thr){ last=k; break; } }
  return Math.max(0.05, Math.min(1, last/n + 0.03));   // 少し余白
}
async function loadPresets(){
  // 順次awaitせず全プリセットを並列生成→ブート高速化
  await Promise.all(PADS.map(async (p,i)=>{
    if(p.type!=="synth") return;
    try{
      const raw = await renderPreset(p.voice);
      tracks[i].rawBuffer = raw;
      tracks[i].buffer = makeLofi(raw);   // 12bit/レート低下を焼き込む
      tracks[i].end = contentEnd(tracks[i].buffer);   // 無音を切ってENDを実音長に
    }catch(e){console.warn("preset fail",i,e);}
  }));
}

    });
    row.appendChild(st);cells.push(st);
  }
  rowEls.push(cells);
  grid.appendChild(row);
});

function paintSteps(){
  if(melodicMode){ paintMelodic(); return; }
  for(let i=0;i<PADS.length;i++){
    const pat=getPattern(i);
    rowEls[i].forEach((el,s)=>{
      el.classList.toggle("on",pat[s]>0);
      el.classList.toggle("acc",pat[s]===2);
      el.classList.toggle("cursor",playing && editPat===displayPat && editBar===displayBar && s===playStep);
    });

}

let copySrc = null;  // copy/chopモード中のコピー元パッド
let nextChokeGroup = 2;  // 1はHH用。チョッピーのスライス群は2以降を自動発行

function copyPadSound(src,dst){
  const s=tracks[src],d=tracks[dst];
  // バッファは参照共有（AudioBufferは再生で変化しないため安全）
  d.buffer=s.buffer; d.rawBuffer=s.rawBuffer;
  d.tune=s.tune; d.start=s.start; d.end=s.end;

  drawPadWave(dst);

// 次のアタックを検出（チョッピー用）：大きめのヒットだけを拾う
function findNextOnset(t){
  if(!t.buffer) return null;
  const data=t.buffer.getChannelData(0);
  const N=data.length, sr=t.buffer.sampleRate;
  const win=Math.max(4,Math.round(sr*0.002));        // 2ms窓
  const hop=Math.max(1,Math.round(sr*0.001));        // 1ms刻みで走査
  const from=Math.min(N-win-1, Math.round(t.start*N)+Math.round(N/32)); // 尺の1/32以内は無視（HH等をスキップ）
  const rms=p=>{let s=0;for(let n=0;n<win;n++){const v=data[p+n];s+=v*v;}return Math.sqrt(s/win);};
  // start以降のピークRMS（粗く）
  let peak=0;
  for(let p=from;p<N-win;p+=hop*4){const r=rms(p);if(r>peak)peak=r;}
  if(peak<0.01) return null;
  const lowTh=peak*0.15, highTh=peak*0.7;  // 減衰をしっかり待ち、強いヒット(70%)のみ拾う
  // 1) 減衰を待つ
  let p=from, decayed=false;
  for(;p<N-win;p+=hop){ if(rms(p)<lowTh){decayed=true;break;} }
  if(!decayed) return null;
  // 2) 強い再立ち上がり点（ピークの50%超え＝大きめのアタック）
  for(;p<N-win;p+=hop){ if(rms(p)>=highTh) break; }
  if(p>=N-win) return null;
  // 3) 足元補正：その近傍ピークの15%を超えた最初の点（既存スナップと同方式）
  const r2=Math.round(sr*0.012);
  const lo=Math.max(win,p-r2), hi=Math.min(N-win-1,p+r2);
  let pk2=0; for(let q=lo;q<=hi;q++){const r=rms(q);if(r>pk2)pk2=r;}
  const footTh=pk2*0.15;
  for(let q=lo;q<=hi;q++){ if(rms(q)>=footTh) return q/N; }
  return p/N;
}
function assignMS(i){
  if(armMode==="mute"){ tracks[i].mute=!tracks[i].mute; }
  else if(armMode==="solo"){ tracks[i].solo=!tracks[i].solo; }
  else if(armMode==="copy"){
    if(copySrc===null){ copySrc=i; }       // 最初のタップ＝コピー元
    else if(i!==copySrc){ copyPadSound(copySrc,i); flashPad(i); }
  }
  else if(armMode==="chop"){
    if(copySrc===null){ copySrc=i; }       // 最初のタップ＝元
    else if(i!==copySrc){
      const next=findNextOnset(tracks[copySrc]);
      copyPadSound(copySrc,i);
      if(next!==null){
        tracks[i].start=Math.min(next, tracks[i].end-0.002);
        // コピー元のendを次アタック直前で切る（スライス間の隙間も重なりもなし）
        tracks[copySrc].end=Math.max(tracks[copySrc].start+0.002, next);
      }
      // チョッピーのスライス同士は同時に鳴らない（同一チョークグループに自動割当）
      if(!tracks[copySrc].choke || tracks[copySrc].choke===1){ // 未設定 or HH群なら専用群を新規発行
        tracks[copySrc].choke = nextChokeGroup;
        nextChokeGroup = nextChokeGroup>=8 ? 2 : nextChokeGroup+1; // 2-8で循環
      }
      tracks[i].choke = tracks[copySrc].choke;
      flashPad(i);
      copySrc=i;                            // 数珠つなぎ：貼り先が次の元になる
    }
  }
  paintPadStates();
}
function arm(mode,on){

}

// Koala風：各パッドに小さな波形を描く
function drawPadWave(i){
  const pad=padsEl.children[i]; if(!pad) return;
  const cv=pad.querySelector(".pad-wave"); if(!cv) return;
  const w=pad.clientWidth, h=pad.clientHeight;
  if(!w||!h) return;
  const dpr=window.devicePixelRatio||1;
  cv.width=w*dpr; cv.height=h*dpr;
  const ctx=cv.getContext("2d"); ctx.scale(dpr,dpr);
  ctx.clearRect(0,0,w,h);
  const buf=tracks[i].buffer; if(!buf) return;
  const data=buf.getChannelData(0);
  const s=Math.floor((tracks[i].start||0)*data.length);
  const e=Math.floor((tracks[i].end??1)*data.length);
  const len=Math.max(1,e-s), bin=Math.max(1,Math.floor(len/w));
  const mid=h/2;
  ctx.strokeStyle=(getComputedStyle(document.body).getPropertyValue("--ink").trim()||"#e8e4d8");
  ctx.lineWidth=1; ctx.beginPath();
  for(let x=0;x<w;x++){
    let mn=1,mx=-1; const o=s+x*bin;
    for(let k=0;k<bin;k++){ const v=data[o+k]||0; if(v<mn)mn=v; if(v>mx)mx=v; }
    ctx.moveTo(x+0.5, mid - mx*mid*0.92);
    ctx.lineTo(x+0.5, mid - mn*mid*0.92);
  }
  ctx.stroke();
}
function drawAllPadWaves(){ for(let i=0;i<PADS.length;i++) drawPadWave(i); }

function drawWave(){
  const t=tracks[selected];
  const W=waveWrap.clientWidth, H=waveWrap.clientHeight;
  const dpr=window.devicePixelRatio||1;
  waveCv.width=W*dpr; waveCv.height=H*dpr;
  wctx.setTransform(dpr,0,0,dpr,0,0);
  wctx.clearRect(0,0,W,H);
  document.getElementById("edWho").textContent=String(selected+1).padStart(2,"0")+" "+ (PADS[selected].type==="sample"?t.name:PADS[selected].name);
  if(!t.buffer){ wctx.fillStyle="#3a4149";wctx.font="11px sans-serif";wctx.fillText("no sample",10,H/2);positionHandles();return; }
  const data=t.buffer.getChannelData(0);
  const mid=H/2;
  wctx.strokeStyle="#2c333b";wctx.beginPath();wctx.moveTo(0,mid);wctx.lineTo(W,mid);wctx.stroke();
  wctx.strokeStyle="#5a6b6a";wctx.lineWidth=1;wctx.beginPath();
  const step=Math.max(1,Math.floor(data.length/W));
  for(let x=0;x<W;x++){
    let min=1,max=-1;
    for(let n=0;n<step;n++){const v=data[x*step+n]||0;if(v<min)min=v;if(v>max)max=v;}
    wctx.moveTo(x,mid-max*mid*0.92);wctx.lineTo(x,mid-min*mid*0.92);
  }
  wctx.stroke();
  positionHandles();
}
function positionHandles(){
  const t=tracks[selected];

let lastPlayhead=null;       // 直近の選択パッド発音
let cursorRaf=null;
const playheadEl=document.getElementById("playhead");
function updatePlayCursor(now){
  if(!lastPlayhead){ playheadEl.style.opacity=0; return; }
  const ph=lastPlayhead;
  if(ph.pad!==selected){ playheadEl.style.opacity=0; lastPlayhead=null; return; }
  const elapsed=(now-ph.when)*ph.rate/ph.dur;   // 正規化された進行量
  if(elapsed<0){ return; }                       // まだ発音前（先読み分）
  let pos;
  if(ph.loop){
    const span=ph.endN-ph.loopStartN;
    const first=ph.endN-ph.startN;
    if(elapsed<first) pos=ph.startN+elapsed;
    else pos=ph.loopStartN+((elapsed-first)%span);
  } else {
    pos=ph.startN+elapsed;
    if(pos>=ph.endN){ playheadEl.style.opacity=0; lastPlayhead=null; return; }
  }
  const W=waveWrap.clientWidth;
  playheadEl.style.left=(pos*W)+"px";
  playheadEl.style.opacity=1;
}
// 手叩き時もカーソルが動くよう、必要な間だけrAFを回す

  if(cursorRaf) return;

    if(lastPlayhead){ cursorRaf=requestAnimationFrame(loop); }
    else { cursorRaf=null; }
  };
  cursorRaf=requestAnimationFrame(loop);
}
// ドラッグ
let dragH=null;
function xToNorm(clientX){
  const r=waveWrap.getBoundingClientRect();
  return Math.min(1,Math.max(0,(clientX-r.left)/r.width));
}
function nearest(nx){
  const t=tracks[selected];
  const cand=[["start",t.start],["end",t.end]];
  if(t.loop) cand.push(["loop",t.loopStart]);
  cand.sort((a,b)=>Math.abs(a[1]-nx)-Math.abs(b[1]-nx));
  return cand[0][0];
}
waveWrap.addEventListener("pointerdown",e=>{
  if(!tracks[selected].buffer)return;
  dragH=nearest(xToNorm(e.clientX));
  waveWrap.setPointerCapture(e.pointerId);
  applyDrag(e.clientX);
});
waveWrap.addEventListener("pointermove",e=>{ if(dragH)applyDrag(e.clientX); });
waveWrap.addEventListener("pointerup",()=>{
  // startを離したらアタック（立ち上がり）へ常にスナップ
  if(dragH==="start") snapStartToOnset();
  dragH=null;
});

// 立ち上がり検出：startの近傍で「最初に音量が急増する点」へ吸着（食い込み防止）
function snapStartToOnset(){
  const t=tracks[selected];
  if(!t.buffer)return;
  // 波形の先頭ごく近くに置いたときは吸着しない（頭をそのまま残す）
  if(t.start <= 0.005){ return; }
  const data=t.buffer.getChannelData(0);
  const N=data.length;
  const sr=t.buffer.sampleRate;
  const win=Math.max(4,Math.round(sr*0.002));   // 2ms窓
  const range=Math.round(sr*0.012);             // 探索 ±12ms に縮小
  const center=Math.round(t.start*N);
  const lo=Math.max(win,center-range), hi=Math.min(N-win-1,center+range);
  const rms=p=>{let s=0;for(let n=0;n<win;n++){const v=data[p+n];s+=v*v;}return Math.sqrt(s/win);};

  // 範囲内のピークRMSを基準に、その15%を超えた最初の点＝立ち上がりの足元に止める
  let peak=0;
  for(let p=lo;p<=hi;p++){const r=rms(p);if(r>peak)peak=r;}
  if(peak<0.01){ return; } // 明確なアタックなし→動かさない
  const thresh=peak*0.15;
  let onset=-1;
  for(let p=lo;p<=hi;p++){
    if(rms(p)>=thresh){ onset=p; break; }
  }
  if(onset>=0){ t.start=Math.min(onset/N, t.end-0.002); positionHandles(); }
}

function applyDrag(clientX){
  const t=tracks[selected];const nx=xToNorm(clientX);
  if(dragH==="start") t.start=Math.min(nx,t.end-0.002);
  else if(dragH==="end") t.end=Math.max(nx,t.start+0.002);
  else if(dragH==="loop") t.loopStart=Math.min(Math.max(nx,t.start),t.end-0.002);
  positionHandles();
}

// ---------- transport (self-scheduling, lookahead) ----------
let bpmVal = 100;
let swingPct = 50;          // SP流 離散値: 50/54/58/63/67/71

// SP-1200: シーケンサー解像度 24PPQ。16分音符 = 6tick。
// 全ステップの時刻をマスタークロック（tick）から絶対位置で導出する。
// 加算累積方式ではなく、ステップ番号×tick時間で計算（実機と同じ分周方式）。
const PPQ = 24;
const TICKS_PER_16TH = PPQ/4; // 6
function tickDur(){ return (60/bpmVal)/PPQ; }      // 1tickの長さ（秒）
function stepDur(){ return (60/bpmVal)/4; }         // 16分音符の長さ（秒）
function swingDelayTicks(){
  return Math.round((2*swingPct/100 - 1) * TICKS_PER_16TH);
}
function effectiveSwing(){
  return Math.round((0.5 + swingDelayTicks()/TICKS_PER_16TH/2)*1000)/10; // %
}

// SP的微細ドリフト（タイミング揺れ）
// 実機はDAC/トリガーの遅延で±0.5ms程度のジッターがあったとされる
// グルーヴ量はシャッフル(swing)に連動：強くするほどレイドバック/スタッガー/ドリフトが増す
function grooveFactor(){ return Math.min(1, Math.max(0,(swingPct-50)/21)); } // 0(50%)〜1(71%)
function driftSec(){
  const ms = 0.7 + 0.8*grooveFactor();        // ±0.7〜1.5ms
  return (Math.random()*2-1) * ms/1000;
}
function laidbackSec(){ return 0.006 + 0.016*grooveFactor(); } // 2拍4拍: 6〜22ms
function staggerSec(){  return 0.0015 + 0.003*grooveFactor(); } // 同時発音: 1.5〜4.5ms/音

const LOOKAHEAD = 0.025;    // sec, how far ahead we schedule
const INTERVAL = 25;        // ms timer
let schedTimer = null;
let drawQueue = [];         // {step, time, hits}
let barStartTime = 0;       // 現在のループの開始時刻（tick導出の基準）

function scheduleStep(stepNo, when){
  const hits=[];
  let n=0;  // 同時発音のスタッガー順（若い番号＝Kick→Snare…から先に発音）
  const stg=staggerSec();
  for(let i=0;i<PADS.length;i++){
    const v=getPlayPattern(i)[stepNo];
    if(v>0 && audible(i)){
      if(isMelodic(i)) playVoice(i, when + n*stg, false, true, scaleSemi(tracks[i].scale, v-1));  // v=音程(1〜)
      else playVoice(i, when + n*stg, v===2, true);
      hits.push({pad:i, acc:isMelodic(i)?false:v===2});
      n++;
    }
  }
  drawQueue.push({step:stepNo, time:when, hits, pat:playPat, bar:playBar});
}

// ステップの絶対時刻をtickから導出（加算累積しない = ドリフトしない）
function stepTimeClean(stepNo){
  const baseTick = stepNo * TICKS_PER_16TH;
  const swTicks = (stepNo%2===1) ? swingDelayTicks() : 0;
  let t = barStartTime + (baseTick + swTicks) * tickDur();
  if(stepNo % 8 === 4) t += laidbackSec();   // 2拍・4拍を少し後ろへ＝バックビートのレイドバック
  return t;
}

function scheduler(){
  while(stepTimeClean(stepIdx) < AC.currentTime + LOOKAHEAD){
    // SP的微細ドリフトはスケジュール時のみ適用
    const when = stepTimeClean(stepIdx) + driftSec();
    scheduleStep(stepIdx, when);
    stepIdx++;
    if(stepIdx >= STEPS){
      stepIdx = 0;
      barStartTime += STEPS * TICKS_PER_16TH * tickDur();
      // 小節アタマ：予約があれば次パターンへ切替、無ければ同パターン内の次小節（書いた分でループ）
      if(queuedPat !== null){ playPat = queuedPat; playBar = 0; queuedPat = null; }
      else { playBar++; if(playBar >= patLength(playPat)) playBar = 0; }
    }
  }
}
function drawLoop(){
  const now = AC.currentTime;
  let cur=null;
  while(drawQueue.length && drawQueue[0].time < now){
    const ev=drawQueue.shift();
    cur=ev.step;
    if(ev.hits) ev.hits.forEach(h=>{flashPad(h.pad);if(typeof vuHit==="function")vuHit(h.pad,h.acc);});
    if(ev.pat!==undefined){ displayPat=ev.pat; displayBar=ev.bar; updatePatIndicator(ev.pat); updateBarIndicator(ev.bar); }
  }
  if(cur!==null){ playStep=cur; paintSteps(); }
  updatePlayCursor(now);
  if(playing) requestAnimationFrame(drawLoop);
}

  if(AC.state!=="running") await AC.resume();
  playing=!playing;
  playBtn.classList.toggle("on",playing);
  playBtn.textContent=playing?"Stop":"Play";
  // S2400風の右下START/STOPも同期
  const pp=document.getElementById("padPlay");
  if(pp){pp.classList.toggle("on",playing);pp.textContent=playing?"■ STOP":"▶ START";}
  if(playing){
    stepIdx=0; playStep=0; drawQueue.length=0;
    playPat=editPat; playBar=0; queuedPat=null; displayPat=editPat; displayBar=0;
    barStartTime=AC.currentTime+0.05;
    schedTimer=setInterval(scheduler, INTERVAL);
    requestAnimationFrame(drawLoop);
  } else {
    clearInterval(schedTimer); schedTimer=null;
    drawQueue.length=0; playStep=0; paintSteps();
    clearPatIndicator(); clearBarIndicator();   // 停止したら再生中の外枠を消す
  }
});

// tap tempo: 直近4タップの平均間隔。2秒空いたらリセット
const tapBtn=document.getElementById("tap");
let taps=[];
tapBtn.addEventListener("pointerdown",()=>{
  const now=performance.now();
  if(taps.length && now-taps[taps.length-1]>2000) taps=[];
  taps.push(now);
  if(taps.length>4) taps.shift();
  if(taps.length>=2){
    const iv=(taps[taps.length-1]-taps[0])/(taps.length-1);
    const newBpm=Math.min(180,Math.max(60, 60000/iv));
    bpmVal=Math.round(newBpm*10)/10;
    bpm.value=bpmVal;
    bpmRead.textContent=bpmVal.toFixed(1);
  }
  tapBtn.classList.add("on");setTimeout(()=>tapBtn.classList.remove("on"),90);
});

// keyboard
window.addEventListener("keydown",async(e)=>{
  if(e.repeat)return;
  // スライダーやセレクトにフォーカス中はパッドキーを無効化（キーボード操作を優先）
  const ae=document.activeElement;
  if(ae&&(ae.tagName==="INPUT"||ae.tagName==="SELECT")) return;
  if(e.code==="Space"){e.preventDefault();playBtn.click();return;}
  // Shift+パッドキー = そのパッドのミュートをトグル（発音せず）
  if(e.shiftKey){
    const mi=CODEMAP.indexOf(e.code);
    if(mi>=0){ e.preventDefault(); tracks[mi].mute=!tracks[mi].mute; paintPadStates(); if(typeof paintMixer==="function") paintMixer(); return; }
  }
  const k=e.key.toLowerCase();
  const i=KEYMAP.indexOf(k);
  if(i>=0){if(AC.state!=="running")await AC.resume();trigger(i);selectPad(i);}
});

// ---------- 切替で高さが変わらないよう、PADSの高さに統一（PC） ----------
let refViewH = 0;
function lockViewHeight(){
  const body=document.querySelector(".body");
  const vp=document.getElementById("viewPads"), vm=document.getElementById("viewMix");
  if(!body||!vp) return;
  if(window.innerWidth<=600){ body.style.minHeight=""; if(vm) vm.style.maxHeight=""; return; } // スマホは固定しない
  if(vp.classList.contains("active")){ body.style.minHeight=""; refViewH=vp.offsetHeight; }     // PADSの自然高さを基準に測る
  if(refViewH){
    body.style.minHeight = refViewH+"px";        // どのビューも縮まない＝高さ一定
    if(vm) vm.style.maxHeight = refViewH+"px";    // MIXは伸びない（超過分は内部スクロール）
  }
  // SEQのグリッドはCSSのflexで余白を自動充填するので個別計算は不要
}

document.getElementById("dupBar").addEventListener("click",()=>{
  if(editBar>=3) return;   // 最大4小節
  const dst=editBar+1;
  for(let i=0;i<PADS.length;i++) tracks[i].patterns[editPat][dst]=tracks[i].patterns[editPat][editBar].slice();
  editBar=dst;             // 複写先の小節を編集対象に
  paintSteps(); paintPatBar();
});
// 再生中＝外枠 / 予約中＝点滅 / 中身あり＝ドット
function updatePatIndicator(p){
  [...patSeg.children].forEach((b,j)=>{ b.classList.toggle("playing", j===p); if(j===p) b.classList.remove("queued"); });
}
function clearPatIndicator(){ [...patSeg.children].forEach(b=>b.classList.remove("playing","queued")); }
function updateBarIndicator(bar){ [...barSeg.children].forEach((b,j)=>b.classList.toggle("playing", j===bar)); }
function clearBarIndicator(){ [...barSeg.children].forEach(b=>b.classList.remove("playing")); }
// 編集状態・中身ドット・予約点滅・ループ外小節をまとめて反映
function paintPatBar(){
  [...patSeg.children].forEach((b,j)=>{
    b.classList.toggle("on", j===editPat);
    b.classList.toggle("has", patHasContent(j));
    b.classList.toggle("queued", playing && queuedPat===j);
  });
  [...barSeg.children].forEach((b,j)=>{
    b.classList.toggle("on", j===editBar);
    b.classList.toggle("has", barHasContent(editPat,j));
    b.classList.toggle("dim", j>=patLength(editPat) && !barHasContent(editPat,j));
  });
}

// --- VUトリガー：発音時にレベルを設定 ---
function vuHit(padIdx, accent){
  const g=dbToGain(tracks[padIdx].vol + (accent?5:0));
  vuLevels[padIdx]=Math.min(1, g*1.4);   // 少し誇張して見やすく
  masterVuLevel=Math.min(1, masterVuLevel + g*0.4);
}

// --- VUアニメーションループ ---
const masterVuEl=document.getElementById("masterVu");
function vuLoop(){
  const mixActive=document.getElementById("viewMix").classList.contains("active");
  if(mixActive){   // chフェーダーのVUは隠れてる時は更新不要
    for(let i=0;i<PADS.length;i++){
      const h=Math.round(vuLevels[i]*100);
      chEls[i].vu.style.height=h+"%";
      chEls[i].vu.classList.toggle("peak",vuLevels[i]>0.85);
    }
  }
  // マスターVUは常時表示なので常に更新
  const mw=Math.round(masterVuLevel*100);
  masterVuEl.style.width=mw+"%";
  masterVuEl.classList.toggle("peak",masterVuLevel>0.85);
  // ディケイ
  for(let i=0;i<PADS.length;i++) vuLevels[i]*=0.88;
  masterVuLevel*=0.92;
  requestAnimationFrame(vuLoop);
}
requestAnimationFrame(vuLoop);

function paintMixer(){
  for(let i=0;i<PADS.length;i++){
    const c=chEls[i];
    c.fader.value=tracks[i].vol;
    c.val.textContent=tracks[i].vol;
    c.el.classList.toggle("muted",tracks[i].mute);
    c.el.classList.toggle("soloed",tracks[i].solo);
    c.mBtn.classList.toggle("m-on",tracks[i].mute);
    c.sBtn.classList.toggle("s-on",tracks[i].solo);
    c.nm.textContent=tracks[i].name||PADS[i].name;
  }
}

function startRec(){
  recChoose.style.display="none"; recActiveEl.style.display="flex";
  recChunks=[]; recStartMs=performance.now();
  try{
    // mimeTypeはブラウザに任せる（指定すると非対応で落ちる）
    recorder=new MediaRecorder(recStream);
  }catch(e){
    document.getElementById("sampName").textContent="MediaRecorder非対応: "+e.message;
    stopRec(true); return;
  }
  recorder.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
  recorder.onstop=async()=>{ await finalizeRec(); };
  try{ recorder.start(); }catch(e){
    document.getElementById("sampName").textContent="録音開始失敗: "+e.message;
    stopRec(true); return;
  }
  recTimerId=setInterval(()=>{
    const s=((performance.now()-recStartMs)/1000).toFixed(1);
    document.getElementById("recTime").textContent=s+"s";
  },100);
}
document.getElementById("recStop").addEventListener("click",()=>stopRec(false));
function stopRec(cancel){
  clearInterval(recTimerId);
  if(recorder&&recorder.state==="recording"){ if(cancel){recorder.ondataavailable=null;recorder.onstop=null;} recorder.stop(); }
  if(recStream){recStream.getTracks().forEach(t=>t.stop());recStream=null;}
  recOverlay.classList.remove("show");
  if(cancel){recorder=null;recChunks=[];}
}
async function finalizeRec(){
  if(recChunks.length===0){
    document.getElementById("sampName").textContent="録音データなし";
    recorder=null;recChunks=[]; return;
  }
  const blob=new Blob(recChunks);
  try{
    const arr=await blob.arrayBuffer();
    let buf;
    try{ buf=await AC.decodeAudioData(arr); }
    catch(decErr){
      // webm等でdecodeAudioData失敗時、AudioContext.decodeAudioDataのPromise版を試す
      buf=await new Promise((res,rej)=>AC.decodeAudioData(arr,res,rej));
    }
    tracks[selected].rawBuffer=buf;
    tracks[selected].buffer=makeLofi(buf);
    tracks[selected].start=0;tracks[selected].end=1;
    tracks[selected].loop=false;tracks[selected].loopStart=0;
    PADS[selected].type="sample";
    tracks[selected].name="REC";
    const nm="REC "+String(selected+1).padStart(2,"0");
    padsEl.children[selected].querySelector(".nm").textContent=nm;
    document.getElementById("sampName").textContent="Sampled! ("+((blob.size/1024)|0)+"KB)";
    drawPadWave(selected);
    if(typeof syncEditor==="function") syncEditor();
  }catch(e){
    document.getElementById("sampName").textContent="デコード失敗: "+e.message;
  }
  recorder=null;recChunks=[];
}

// ===== SAVE / LOAD =====
// AudioBuffer → WAV (Uint8Array)
function bufToWav(buf, fromSamp, toSamp){
  const ch=1, sr=buf.sampleRate, fullData=buf.getChannelData(0);
  const from=fromSamp||0, to=toSamp||fullData.length;
  const len=to-from;
  const bps=16, byteRate=sr*ch*bps/8, blockAlign=ch*bps/8;
  const dataLen=len*blockAlign;
  const ab=new ArrayBuffer(44+dataLen);
  const dv=new DataView(ab);
  const ws=(o,s)=>{for(let i=0;i<s.length;i++)dv.setUint8(o+i,s.charCodeAt(i));};
  ws(0,"RIFF"); dv.setUint32(4,36+dataLen,true); ws(8,"WAVE");
  ws(12,"fmt "); dv.setUint32(16,16,true); dv.setUint16(20,1,true);
  dv.setUint16(22,ch,true); dv.setUint32(24,sr,true);
  dv.setUint32(28,byteRate,true); dv.setUint16(32,blockAlign,true); dv.setUint16(34,bps,true);
  ws(36,"data"); dv.setUint32(40,dataLen,true);
  let o=44;
  for(let i=from;i<to;i++){
    let s=Math.max(-1,Math.min(1,fullData[i]));
    dv.setInt16(o,s<0?s*0x8000:s*0x7FFF,true); o+=2;
  }
  return new Uint8Array(ab);
}
// クロップ情報を計算：start-1s〜end+1sの範囲、設定値を再計算
function calcCrop(t){
  if(!t.buffer) return null;
  const sr=t.buffer.sampleRate, N=t.buffer.length, dur=t.buffer.duration;
  const pad=sr;  // 前後1秒
  const fromSamp=Math.max(0, Math.round(t.start*N) - pad);
  const toSamp=Math.min(N, Math.round(t.end*N) + pad);
  const cropLen=toSamp-fromSamp;
  // 設定値をクロップ後の範囲に再計算（正規化0..1）
  const newStart=Math.max(0, (t.start*N - fromSamp)/cropLen);
  const newEnd=Math.min(1, (t.end*N - fromSamp)/cropLen);
  const newLoopStart=Math.max(0, Math.min(newEnd, (t.loopStart*N - fromSamp)/cropLen));
  return {fromSamp, toSamp, start:newStart, end:newEnd, loopStart:newLoopStart};
}
function uint8ToB64(u8){
  let bin=""; for(let i=0;i<u8.length;i++)bin+=String.fromCharCode(u8[i]);
  return btoa(bin);
}
function b64ToUint8(b64){
  const bin=atob(b64); const u8=new Uint8Array(bin.length);
  for(let i=0;i<bin.length;i++)u8[i]=bin.charCodeAt(i); return u8;
}

document.getElementById("saveBtn").addEventListener("click",()=>{

        vol:t.vol, tune:t.tune, scale:t.scale,

        choke:t.choke, mute:t.mute, solo:t.solo,
        patterns:t.patterns,

document.getElementById("loadProjBtn").addEventListener("click",()=>{

async function applyProject(proj){
    // restore globals
    bpmVal=proj.bpm||100;
    document.getElementById("bpm").value=bpmVal;
    document.getElementById("bpmRead").textContent=bpmVal.toFixed(1);
    swingPct=proj.swing||50;
    document.getElementById("swing").value=swingPct;
    // comp
    if(proj.comp){
      compThreshold=proj.comp.threshold; compDrive=proj.comp.drive;
      compOn=proj.comp.on;
      document.getElementById("compToggle").classList.toggle("on",compOn);
      document.getElementById("kComp").value=compThreshold;
      document.getElementById("vComp").textContent=compThreshold;
      document.getElementById("kDrive").value=Math.round(compDrive*10);
      document.getElementById("vDrive").textContent=compDrive.toFixed(1);
      setCompBypass(compOn);
      saturator.curve=makeSatCurve(compDrive);
    }
    if(proj.masterVol!=null){
      document.getElementById("kMaster").value=proj.masterVol;
      masterGain.gain.value=Math.pow(10,proj.masterVol/20);
      document.getElementById("vMaster").textContent=proj.masterVol+" dB";
    }
    // tracks
    for(let i=0;i<Math.min(proj.tracks.length,16);i++){
      const pt=proj.tracks[i], t=tracks[i];
      t.name=pt.name||PADS[i].name;
      PADS[i].type=pt.type||"empty";
      PADS[i].voice=pt.voice||null;
      t.vol=pt.vol??-4; t.tune=pt.tune??0; t.scale=pt.scale??"off";
      t.start=pt.start??t.start??0; t.end=pt.end??t.end??1;   // 未指定はプリセットの自動トリム値を保持
      t.loop=pt.loop??false; t.loopStart=pt.loopStart??0;
      t.filter=pt.filter??"off"; t.cutoff=pt.cutoff??12000; t.reso=pt.reso??0.7;
      t.choke=pt.choke??0; t.mute=pt.mute??false; t.solo=pt.solo??false;
      // パターン読込（新形式: patterns[p][小節][step] / 旧形式: patterns[p]=16数値 を1小節として吸収）
      if(pt.patterns) for(let p=0;p<4;p++){
        for(let bar=0;bar<4;bar++) t.patterns[p][bar]=new Array(STEPS).fill(0);
        const pat=pt.patterns[p];
        if(Array.isArray(pat)){
          if(typeof pat[0]==="number"){ t.patterns[p][0]=pat.slice(0,STEPS); }                 // 旧: 1小節
          else for(let bar=0;bar<4&&bar<pat.length;bar++) if(Array.isArray(pat[bar])) t.patterns[p][bar]=pat[bar].slice(0,STEPS);
        }
        for(let bar=0;bar<4;bar++) while(t.patterns[p][bar].length<STEPS) t.patterns[p][bar].push(0);
      }
      // audio
      if(pt.audio){
        const wav=b64ToUint8(pt.audio);
        const ab=wav.buffer.slice(wav.byteOffset,wav.byteOffset+wav.byteLength);
        const decoded=await AC.decodeAudioData(ab);
        t.rawBuffer=decoded;
        t.buffer=makeLofi(decoded);
      }
      padsEl.children[i].querySelector(".nm").textContent=t.name.slice(0,8).toUpperCase();
      const rn=grid.children[i]?.querySelector(".rn");
      if(rn) rn.innerHTML=`<b>${String(i+1).padStart(2,"0")}</b> ${t.name}`;
    }
    editPat=0; editBar=0;
    selectPad(0); paintPadStates(); paintSteps(); paintMixer(); paintPatBar(); drawAllPadWaves();
}
document.getElementById("projFile").addEventListener("change",async(e)=>{
  const f=e.target.files[0]; e.target.value=""; if(!f)return;
  try{
    const proj=JSON.parse(await f.text());
    if(!proj.version||!proj.tracks) throw new Error("Invalid project file");
    await applyProject(proj);
    document.getElementById("sampName").textContent="Loaded: "+f.name;
  }catch(err){ alert("Load失敗: "+err.message); }
});

(function(){
  const seg=document.getElementById("themeSeg"), KEY="mics-skin";
  function apply(th){
    document.body.classList.remove("t-ak","t-sp","t-rl");
    document.body.classList.add("t-"+th);
    if(typeof drawAllPadWaves==="function") drawAllPadWaves();
    [...seg.children].forEach(b=>b.classList.toggle("on",b.dataset.th===th));
    try{ localStorage.setItem(KEY,th); }catch(e){}

  apply(saved);
})();

// ---------- バージョン確認（スプラッシュで新版があれば「タップで更新」表示） ----------
const APP_VERSION = "0.1.0";
(function(){
  const verEl=document.getElementById("splashVer"), upEl=document.getElementById("splashUpdate");
  if(verEl) verEl.textContent="v"+APP_VERSION;
  // 更新ボタンのタップはスプラッシュ起動に伝播させず、リロードで最新取得
  if(upEl) upEl.addEventListener("pointerdown",e=>{ e.stopPropagation(); location.reload(); });
  // 同じ場所のversion.jsonを取得して比較（ローカルfile://やオフライン時は黙って無視）
  fetch("version.json?ts="+Date.now(),{cache:"no-store"})
    .then(r=>r.ok?r.json():null)
    .then(d=>{
      if(d && d.version && d.version!==APP_VERSION && upEl){
        upEl.textContent="● NEW v"+d.version+" — TAP TO UPDATE";
        upEl.style.display="";
      }
    }).catch(()=>{});
})();

// ---------- スプラッシュ → 最初のタップで全画面＋音声起動 ----------
// （ブラウザ仕様上、全画面化には必ず1回のユーザー操作が必要。
//   起動画面を全面に出すことで、その最初のタップで全画面に入る）
(function(){
  let done=false;
  const splash=document.getElementById("splash");
  function start(){
    if(done) return; done=true;
    const el=document.documentElement;
    const req=el.requestFullscreen||el.webkitRequestFullscreen||el.mozRequestFullScreen||el.msRequestFullscreen;
    if(req){ try{ req.call(el); }catch(e){} }
    try{
      if(typeof AC!=="undefined"){
        if(AC.state!=="running") AC.resume();
        // 音声スレッドを先に起こす（無音1フレーム）→最初の発音の遅延を削減
        const b=AC.createBuffer(1,1,AC.sampleRate);
        const s=AC.createBufferSource(); s.buffer=b; s.connect(AC.destination); s.start(0);
      }
    }catch(e){}
    if(splash){ splash.classList.add("hide"); setTimeout(()=>splash.remove(),400); }
    window.removeEventListener("pointerdown",start);
    window.removeEventListener("keydown",start);
  }
  window.addEventListener("pointerdown",start);
  window.addEventListener("keydown",start);
})();
</script>
