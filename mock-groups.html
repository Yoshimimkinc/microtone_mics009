<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="robots" content="noindex,nofollow">
<title>microtone — Group mock</title>
<style>
  :root{
    --bg:#121417; --panel:#1b1f24; --panel2:#23282f; --edge:#0a0c0e; --line:#32383f;
    --ink:#e8e4d8; --dim:#7b8088; --amber:#ff8a3d; --teal:#3dd6c4; --red:#ff4d4d; --pad:#2b3038; --pad-face:#343b44;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;background:#000;color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
    touch-action:manipulation;}
  body{padding:14px;display:flex;flex-direction:column;gap:12px;}
  .head{display:flex;align-items:baseline;gap:10px;}
  .head .logo{font-size:22px;font-weight:700;} .head .logo b{color:var(--amber);}
  .head .tag{font-size:10px;color:var(--dim);letter-spacing:.2em;text-transform:uppercase;}
  .label{font-size:10px;color:var(--dim);letter-spacing:.26em;text-transform:uppercase;}
  .hint{font-size:11px;color:var(--dim);line-height:1.5;}

  /* 4グループ 2×2（上=サンプル/下=ドラム） */
  .grp-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px;max-width:560px;}
  .grp{position:relative;overflow:hidden;border-radius:18px;
    background:linear-gradient(180deg,var(--pad-face),var(--pad));
    border:1px solid var(--edge);
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.06);
    min-height:148px;padding:12px;touch-action:none;cursor:ns-resize;user-select:none;
    display:flex;flex-direction:column;}
  /* ボリューム塗り（下から上へ） */
  .grp .fill{position:absolute;left:0;right:0;bottom:0;height:0%;
    background:linear-gradient(180deg, rgba(255,138,61,.35), rgba(255,138,61,.12));
    pointer-events:none;transition:height .03s linear;}
  .grp.muted .fill{background:linear-gradient(180deg, rgba(123,128,136,.3), rgba(123,128,136,.1));}
  .grp .row{position:relative;z-index:1;display:flex;align-items:flex-start;justify-content:space-between;gap:8px;}
  .grp .name{font-size:13px;letter-spacing:.06em;color:var(--ink);font-variant-numeric:tabular-nums;}
  .grp .ms{display:flex;gap:6px;}
  .grp .ms button{border:none;border-radius:7px;width:34px;height:30px;font:inherit;font-size:12px;font-weight:700;
    background:rgba(0,0,0,.28);color:var(--dim);cursor:pointer;}
  .grp .ms button.m-on{background:var(--red);color:#fff;}
  .grp .ms button.s-on{background:var(--teal);color:#06201d;}
  /* 中央：上下スワイプ表現＋dB */
  .grp .center{position:relative;z-index:1;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:6px;}
  .grp .arrow{font-size:30px;line-height:1;color:var(--ink);opacity:.5;}
  .grp .db{font-size:20px;font-weight:700;font-variant-numeric:tabular-nums;color:var(--ink);}
  .grp .db .u{font-size:11px;color:var(--dim);font-weight:400;margin-left:2px;}
  .grp.muted .db{color:var(--dim);}
  .grp.soloed{box-shadow:0 0 0 2px var(--teal), 0 6px 16px rgba(0,0,0,.45);}
</style>
</head>
<body>
  <div class="head"><span class="logo">micro<b>tone</b></span><span class="tag">GROUP MOCK</span></div>
  <div class="label">Groups — 角丸ボタンを上下になぞって音量 / 右上 M·S</div>
  <div class="grp-grid" id="grid"></div>
  <div class="hint">※これはモック（見た目と操作感の確認用）。本体には未組込み。<br>
    ボタンを上下にドラッグ＝グループ音量。M=ミュート / S=ソロ。</div>

<script>
const GROUPS=[
  {name:"SMP 9-12"}, {name:"SMP 13-16"},
  {name:"DR 1-4"},   {name:"DR 5-8"},
];
const MIN=-30, MAX=6;
const grid=document.getElementById("grid");
GROUPS.forEach(g=>{
  let vol=0, mute=false, solo=false;
  const el=document.createElement("div"); el.className="grp";
  el.innerHTML=`<div class="fill"></div>
    <div class="row"><div class="name">${g.name}</div>
      <div class="ms"><button class="m">M</button><button class="s">S</button></div></div>
    <div class="center"><div class="arrow">↕</div><div class="db"></div></div>`;
  const fill=el.querySelector(".fill"), db=el.querySelector(".db");
  const mBtn=el.querySelector(".m"), sBtn=el.querySelector(".s");
  const paint=()=>{
    const pct=(vol-MIN)/(MAX-MIN)*100;
    fill.style.height=pct.toFixed(1)+"%";
    db.innerHTML=(vol>0?"+":"")+vol+'<span class="u">dB</span>';
    el.classList.toggle("muted",mute);
    el.classList.toggle("soloed",solo);
  };
  paint();
  // 上下ドラッグで音量
  let drag=false, startY=0, startV=0, moved=false;
  el.addEventListener("pointerdown",e=>{
    if(e.target.closest(".ms")) return;        // M/Sボタンはドラッグ対象外
    drag=true; moved=false; startY=e.clientY; startV=vol;
    el.setPointerCapture(e.pointerId); e.preventDefault();
  });
  el.addEventListener("pointermove",e=>{
    if(!drag) return;
    const dy=startY-e.clientY; if(Math.abs(dy)>3) moved=true;
    let v=startV + (dy/140)*(MAX-MIN);          // 約140pxでフルレンジ
    v=Math.max(MIN,Math.min(MAX,Math.round(v)));
    if(v!==vol){ vol=v; paint(); }
  });
  const end=()=>{ drag=false; };
  el.addEventListener("pointerup",end); el.addEventListener("pointercancel",end);
  mBtn.addEventListener("click",()=>{ mute=!mute; paint(); });
  sBtn.addEventListener("click",()=>{ solo=!solo; paint(); });
  grid.appendChild(el);
});
</script>
</body>
</html>
